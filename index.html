<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gemini AI Chat</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0}
.wrap{max-width:1000px;margin:20px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
h2{margin-top:0;color:#1565c0}
.row{display:flex;gap:10px;flex-wrap:wrap}
input,select,textarea{width:100%;padding:10px;border:1px solid #bbb;border-radius:6px;font-size:14px}
.col{flex:1;min-width:260px}
button{padding:10px 18px;border:none;border-radius:6px;background:#1565c0;color:#fff;cursor:pointer}
button:disabled{background:#999}
#chat{margin-top:20px;height:420px;overflow:auto;border:1px solid #ccc;border-radius:6px;padding:10px;background:#fafafa}
.msg{margin:12px 0}
.user{font-weight:bold;color:#1565c0}
.ai{font-weight:bold;color:#2e7d32}
.bubble{background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px;white-space:pre-wrap}
#status{margin-top:10px;font-weight:bold}
textarea{height:120px;margin-top:15px}
.small{font-size:12px;color:#666}
</style>
</head>
<body>
<div class="wrap">
<h2>Google Gemini AI Chat</h2>
<div class="row">
<div class="col">
<label>API Key</label>
<input id="apikey" type="password" placeholder="Paste Google AI Studio API Key">
</div>
<div class="col">
<label>Model</label>
<select id="model"><option>Connect first...</option></select>
</div>
</div>
<br>
<button id="connect">Connect</button>
<button id="newchat">New Chat</button>
<div id="status">Not Connected</div>
<div class="small">Uses Gemini v1 API.</div>

<div id="chat"><div class="ai">Assistant</div><div class="bubble">Connect using your API key.</div></div>

<textarea id="prompt" placeholder="Ask anything..."></textarea><br><br>
<button id="send" disabled>Send</button>
</div>

<script>
let history=[];

function esc(t){const d=document.createElement("div");d.innerText=t;return d.innerHTML;}
function add(role,text){
 let c=document.getElementById("chat");
 let cls=role==="You"?"user":"ai";
 c.innerHTML+=`<div class='msg'><div class='${cls}'>${role}</div><div class='bubble'>${esc(text)}</div></div>`;
 c.scrollTop=c.scrollHeight;
}

document.getElementById("newchat").onclick=()=>{
 history=[];
 document.getElementById("chat").innerHTML="<div class='ai'>Assistant</div><div class='bubble'>New conversation started.</div>";
};

document.getElementById("connect").onclick=async()=>{
 const key=document.getElementById("apikey").value.trim();
 if(!key){alert("Enter API key");return;}
 sessionStorage.setItem("gkey",key);
 document.getElementById("status").innerText="Connecting...";
 try{
   const r=await fetch("https://generativelanguage.googleapis.com/v1/models?key="+key);
   const j=await r.json();
   if(j.error){throw new Error(j.error.message);}
   const sel=document.getElementById("model");
   sel.innerHTML="";
   let n=0;
   j.models.forEach(m=>{
      if(m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent")){
        const o=document.createElement("option");
        o.value=m.name.replace("models/","");
        o.text=o.value;
        sel.appendChild(o);
        n++;
      }
   });
   document.getElementById("status").innerText="Connected ("+n+" models)";
   document.getElementById("send").disabled=false;
 }}catch(e){
    document.getElementById("status").innerText = "Error: " + e.message;
}
};

document.getElementById("send").onclick=sendPrompt;
document.getElementById("prompt").addEventListener("keydown",e=>{
 if(e.key==="Enter" && !e.shiftKey){e.preventDefault();sendPrompt();}
});

async function sendPrompt(){
 const key=sessionStorage.getItem("gkey");
 if(!key){alert("Connect first");return;}
 const txt=document.getElementById("prompt").value.trim();
 if(!txt)return;
 const model=document.getElementById("model").value;
 add("You",txt);
 document.getElementById("prompt").value="";
 history.push({role:"user",parts:[{text:txt}]});
 add("Gemini","Thinking...");
 const chat=document.getElementById("chat");
 chat.removeChild(chat.lastElementChild);

 try{
  console.log("Selected Model:", model);

  console.log("URL:",
  `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent`);

 console.log("History:", history);
   const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:history})
   });
   const j=await r.json();
   if(j.error) throw new Error(j.error.message);
   const ans=j.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
   history.push({role:"model",parts:[{text:ans}]});
   add("Gemini",ans);
 }catch(e){
   add("Error",e.message);
   console.log(e);
 }
}
</script>
</body>
</html>
