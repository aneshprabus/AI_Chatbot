<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f5f7fb;
}

.container{
    display:flex;
    height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#1f2937;
    color:#fff;
    padding:25px;
}

.sidebar h2{
    margin-bottom:25px;
    font-size:22px;
}

.sidebar h3{
    margin-bottom:12px;
    font-size:15px;
    color:#9ca3af;
}

.model-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.model{
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
    border:1px solid transparent;
}

.model:hover{
    background:#374151;
}

.model.active{
    background:#2563eb;
    border-color:#60a5fa;
}

/* Main */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:30px;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    color:#111827;
}

.status{
    color:green;
    font-weight:600;
}

/* Chat */

.chat-box{
    flex:1;
    background:#fff;
    border-radius:10px;
    padding:20px;
    overflow:auto;
    border:1px solid #ddd;
}

.message{
    margin-bottom:20px;
}

.user{
    font-weight:600;
    color:#2563eb;
    margin-bottom:6px;
}

.ai{
    font-weight:600;
    color:#059669;
    margin-bottom:6px;
}

.text{
    background:#f4f4f4;
    padding:15px;
    border-radius:8px;
    white-space:pre-wrap;
    line-height:1.5;
}

/* Prompt */

.prompt-section{
    margin-top:20px;
}

textarea{
    width:100%;
    height:120px;
    resize:none;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

.controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#1d4ed8;
}

select{
    padding:10px;
    border-radius:6px;
}

</style>

</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>🤖 AI Portal</h2>

        <h3>Available Models</h3>

        <div class="model-list">

            <div class="model active">Gemini 2.5 Flash</div>

            <div class="model">Gemini 2.5 Flash Lite</div>

            <div class="model">OpenAI GPT</div>

            <div class="model">Claude</div>

            <div class="model">Ollama</div>

            <div class="model">Azure OpenAI</div>

        </div>

    </div>

    <div class="main">

        <div class="header">
            <h1>AI Chat Assistant</h1>
            <div class="status">🟢 Ready</div>
        </div>

        <div class="chat-box" id="chatBox">

            <div class="message">
                <div class="ai">Assistant</div>
                <div class="text">
Welcome!

Select an AI model from the left panel.

Type your prompt below and click "Send".

This page is ready to connect to your backend API.
                </div>
            </div>

        </div>

        <div class="prompt-section">

            <textarea
                id="prompt"
                placeholder="Type your question here..."></textarea>

            <div class="controls">

                <select id="temperature">
                    <option>Temperature : 0.2</option>
                    <option>Temperature : 0.5</option>
                    <option>Temperature : 0.7</option>
                    <option>Temperature : 1.0</option>
                </select>

                <button id="sendBtn">
                    Send →
                </button>

            </div>

        </div>

    </div>

</div>

<script>

const models=document.querySelectorAll(".model");

models.forEach(model=>{

    model.addEventListener("click",()=>{

        models.forEach(m=>m.classList.remove("active"));

        model.classList.add("active");

    });

});

document.getElementById("sendBtn").addEventListener("click",()=>{

    const prompt=document.getElementById("prompt").value.trim();

    if(prompt==="") return;

    const chat=document.getElementById("chatBox");

    const selected=document.querySelector(".model.active").innerText;

    chat.innerHTML+=`
    <div class="message">
        <div class="user">You (${selected})</div>
        <div class="text">${prompt}</div>
    </div>
    `;

    chat.innerHTML+=`
    <div class="message">
        <div class="ai">${selected}</div>
        <div class="text">
Waiting for backend response...
        </div>
    </div>
    `;

    chat.scrollTop=chat.scrollHeight;

    document.getElementById("prompt").value="";

});

</script>

</body>
</html>
