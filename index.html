<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Gemini AI Chat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#eef2f7;
}

.container{
    width:95%;
    max-width:1100px;
    margin:25px auto;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
    color:#1565C0;
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.field{
    flex:1;
    min-width:250px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

textarea{
    height:140px;
    resize:vertical;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

#connectBtn{
    background:#2e7d32;
    color:white;
}

#connectBtn:hover{
    background:#1b5e20;
}

#sendBtn{
    background:#1565C0;
    color:white;
}

#sendBtn:hover{
    background:#0D47A1;
}

.status{
    margin-top:10px;
    font-weight:bold;
}

.connected{
    color:green;
}

.disconnected{
    color:red;
}

.chat{
    margin-top:20px;
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    height:450px;
    overflow-y:auto;
}

.msg{
    margin-bottom:20px;
}

.user{
    color:#1565C0;
    font-weight:bold;
    margin-bottom:5px;
}

.ai{
    color:#2e7d32;
    font-weight:bold;
    margin-bottom:5px;
}

.bubble{
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    padding:12px;
    white-space:pre-wrap;
    line-height:1.6;
}

.loading{
    color:#777;
    font-style:italic;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🤖 Google Gemini AI Chat</h1>

<div class="row">

<div class="field">
<label>Google AI Studio API Key</label>
<input
type="password"
id="apikey"
placeholder="Paste your API Key">
</div>

<div class="field">
<label>Gemini Model</label>

<select id="model">

<option value="gemini-2.5-flash">
Gemini 2.5 Flash
</option>

<option value="gemini-2.5-flash-lite">
Gemini 2.5 Flash Lite
</option>

</select>

</div>

</div>

<button id="connectBtn">Connect</button>

<div id="status" class="status disconnected">
❌ Not Connected
</div>

<div class="chat" id="chat">

<div class="msg">
<div class="ai">Assistant</div>
<div class="bubble">
Welcome!

1. Paste your Google AI Studio API Key.
2. Click Connect.
3. Select a Gemini model.
4. Ask your question.
</div>
</div>

</div>

<br>

<label>Your Prompt</label>

<textarea
id="prompt"
placeholder="Type your question here..."></textarea>

<br><br>

<button id="sendBtn">
Ask Gemini
</button>

</div>

</div>

<script>

let apiKey="";

document.getElementById("connectBtn").onclick=function(){

    const key=document.getElementById("apikey").value.trim();

    if(key===""){
        alert("Please enter your Google AI Studio API Key.");
        return;
    }

    apiKey=key;

    // Save only for this browser tab/session
    sessionStorage.setItem("gemini_api_key",apiKey);

    document.getElementById("status").innerHTML="✅ Connected";
    document.getElementById("status").className="status connected";

};

window.onload=function(){

    const saved=sessionStorage.getItem("gemini_api_key");

    if(saved){

        apiKey=saved;

        document.getElementById("apikey").value=saved;

        document.getElementById("status").innerHTML="✅ Connected";
        document.getElementById("status").className="status connected";

    }

};

document.getElementById("sendBtn").onclick=askGemini;

async function askGemini(){

    apiKey=sessionStorage.getItem("gemini_api_key");

    if(!apiKey){

        alert("Please connect using your API Key first.");

        return;

    }

    const prompt=document.getElementById("prompt").value.trim();

    if(prompt===""){

        alert("Enter a prompt.");

        return;

    }

    const model=document.getElementById("model").value;

    const chat=document.getElementById("chat");

    chat.innerHTML+=`
    <div class="msg">
        <div class="user">You</div>
        <div class="bubble">${escapeHtml(prompt)}</div>
    </div>
    `;

    const loadingId="loading_"+Date.now();

    chat.innerHTML+=`
    <div class="msg" id="${loadingId}">
        <div class="ai">${model}</div>
        <div class="bubble loading">
        Thinking...
        </div>
    </div>
    `;

    chat.scrollTop=chat.scrollHeight;

    document.getElementById("prompt").value="";

    try{

        const response=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                contents:[
                    {
                        parts:[
                            {
                                text:prompt
                            }
                        ]
                    }
                ]
            })
        });

        const data=await response.json();

        let answer="";

        if(data.error){

            answer="ERROR : "+data.error.message;

        }
        else{

            answer=data.candidates?.[0]?.content?.parts?.[0]?.text
                || "No response received.";

        }

        document.getElementById(loadingId).innerHTML=`
        <div class="ai">${model}</div>
        <div class="bubble">${escapeHtml(answer)}</div>
        `;

        chat.scrollTop=chat.scrollHeight;

    }
    catch(err){

        document.getElementById(loadingId).innerHTML=`
        <div class="ai">Error</div>
        <div class="bubble">
${escapeHtml(err.message)}
        </div>
        `;

    }

}

function escapeHtml(text){

    const div=document.createElement("div");

    div.innerText=text;

    return div.innerHTML;

}

</script>

</body>
</html>
