<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini AI Chat</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

h2{
    color:#1a73e8;
}

.controls{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

select{
    padding:10px;
    font-size:15px;
}

textarea{
    width:100%;
    height:140px;
    padding:15px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:vertical;
}

button{
    margin-top:15px;
    background:#1a73e8;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:#1557b0;
}

#response{
    margin-top:20px;
    background:white;
    border-radius:8px;
    padding:20px;
    border:1px solid #ddd;
    white-space:pre-wrap;
    line-height:1.6;
    min-height:250px;
}

.loading{
    color:#777;
}
</style>

</head>
<body>

<div class="container">

<h2>Google Gemini AI Chat</h2>

<div class="controls">

<select id="model">

<option value="gemini-2.5-flash">Gemini 2.5 Flash</option>

<option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>

</select>

</div>

<textarea
id="prompt"
placeholder="Ask anything..."></textarea>

<br>

<button onclick="askGemini()">Ask AI</button>

<div id="response">
Response will appear here...
</div>

</div>

<script>

const API_KEY = "YOUR_GEMINI_API_KEY";

async function askGemini(){

    const prompt = document.getElementById("prompt").value.trim();

    if(prompt===""){
        alert("Please enter a prompt.");
        return;
    }

    const model=document.getElementById("model").value;

    const responseBox=document.getElementById("response");

    responseBox.innerHTML="<div class='loading'>Generating response...</div>";

    try{

        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    contents:[
                        {
                            parts:[
                                {
                                    text:prompt
                                }
                            ]
                        }
                    ]
                })
            }
        );

        const data=await response.json();

        console.log(data);

        if(data.error){
            responseBox.innerHTML="<b>Error:</b><br>"+data.error.message;
            return;
        }

        const answer =
            data.candidates?.[0]?.content?.parts?.[0]?.text ||
            "No response received.";

        responseBox.textContent=answer;

    }
    catch(err){

        responseBox.innerHTML="<b>Error</b><br>"+err.message;

    }

}

</script>

</body>
</html>
