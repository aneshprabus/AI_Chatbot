<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Google Gemini AI Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#edf2f7;
}

.container{
    width:95%;
    max-width:1200px;
    margin:25px auto;
}

.card{
    background:white;
    border-radius:10px;
    padding:25px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    color:#1565C0;
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.field{
    flex:1;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,select{

    width:100%;
    padding:12px;
    font-size:15px;
    border-radius:6px;
    border:1px solid #ccc;

}

button{

    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:6px;
    background:#1565C0;
    color:white;
    cursor:pointer;
    font-size:15px;

}

button:hover{

    background:#0D47A1;

}

.status{

    margin-top:20px;
    font-weight:bold;

}

.connected{

    color:green;

}

.disconnected{

    color:red;

}

.chat{

    margin-top:25px;
    border:1px solid #ddd;
    border-radius:8px;
    background:#fafafa;
    height:400px;
    overflow-y:auto;
    padding:15px;

}

textarea{

    width:100%;
    height:150px;
    margin-top:20px;
    padding:15px;
    border-radius:6px;
    border:1px solid #ccc;
    resize:vertical;

}

#sendBtn{

    background:#2E7D32;

}

#sendBtn:hover{

    background:#1B5E20;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🤖 Google Gemini AI Chat</h1>

<div class="row">

<div class="field">

<label>Google AI Studio API Key</label>

<input
type="password"
id="apikey"
placeholder="Paste your API Key">

</div>

<div class="field">

<label>Gemini Model</label>

<select id="model">

<option>Connect first...</option>

</select>

</div>

</div>

<button id="connectBtn">

Connect

</button>

<div
id="status"
class="status disconnected">

❌ Not Connected

</div>

<div
id="chat"
class="chat">

<b>Assistant</b>

<br><br>

Enter your API Key and click Connect.

</div>

<textarea
id="prompt"
placeholder="Your question..."></textarea>

<br>

<button
id="sendBtn"
disabled>

Ask Gemini

</button>

</div>

</div>

<script>

let apiKey="";
let chatHistory=[];

const connectBtn=document.getElementById("connectBtn");
const status=document.getElementById("status");
const modelList=document.getElementById("model");
const sendBtn=document.getElementById("sendBtn");
const promptBox=document.getElementById("prompt");
const chat=document.getElementById("chat");

window.onload=function(){

    const saved=sessionStorage.getItem("gemini_api_key");

    if(saved){

        document.getElementById("apikey").value=saved;

    }

}

connectBtn.onclick=connectGemini;

async function connectGemini(){

    apiKey=document.getElementById("apikey").value.trim();

    if(apiKey===""){

        alert("Please enter your API Key.");

        return;

    }

    sessionStorage.setItem("gemini_api_key",apiKey);

    status.innerHTML="Connecting...";

    try{

        const response=await fetch(

            "https://generativelanguage.googleapis.com/v1beta/models?key="+apiKey

        );

        const data=await response.json();

        if(data.error){

            status.innerHTML="❌ "+data.error.message;
            status.className="status disconnected";
            return;

        }

        modelList.innerHTML="";

        let count=0;

        data.models.forEach(model=>{

            if(model.supportedGenerationMethods &&
               model.supportedGenerationMethods.includes("generateContent")){

                let option=document.createElement("option");

                option.value=model.name.replace("models/","");

                option.text=model.displayName || option.value;

                modelList.appendChild(option);

                count++;

            }

        });

        status.innerHTML="✅ Connected ("+count+" models)";
        status.className="status connected";

        sendBtn.disabled=false;

        chat.innerHTML="<b>Assistant</b><br><br>Connected successfully.<br>You can now start chatting.";

    }

    catch(err){

        status.innerHTML="❌ "+err.message;
        status.className="status disconnected";

    }

}

sendBtn.onclick=sendPrompt;

promptBox.addEventListener("keydown",function(e){

    if(e.key==="Enter" && !e.shiftKey){

        e.preventDefault();

        sendPrompt();

    }

});

async function sendPrompt(){

    apiKey=sessionStorage.getItem("gemini_api_key");

    if(!apiKey){

        alert("Connect first.");

        return;

    }

    const prompt=promptBox.value.trim();

    if(prompt==="") return;

    const model=modelList.value;

    addMessage("You",prompt,"#1565C0");

    promptBox.value="";

    addLoading();

    chatHistory.push({

        role:"user",

        parts:[

            { text:prompt }

        ]

    });

    try{

        const response=await fetch(

            `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,

            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    contents:chatHistory

                })

            }

        );

        const data=await response.json();

        removeLoading();

        if(data.error){

            addMessage("Error",data.error.message,"red");

            return;

        }

        const answer=data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";

        chatHistory.push({

            role:"model",

            parts:[

                { text:answer }

            ]

        });

        addMessage(model,answer,"green");

    }

    catch(err){

        removeLoading();

        addMessage("Error",err.message,"red");

    }

}

function addMessage(sender,text,color){

    const div=document.createElement("div");

    div.style.marginBottom="20px";

    div.innerHTML=`

        <div style="font-weight:bold;color:${color};margin-bottom:6px">

            ${sender}

        </div>

        <div style="background:white;border:1px solid #ddd;padding:12px;border-radius:6px;white-space:pre-wrap">

            ${formatText(text)}

        </div>

    `;

    chat.appendChild(div);

    chat.scrollTop=chat.scrollHeight;

}

function addLoading(){

    const div=document.createElement("div");

    div.id="loading";

    div.innerHTML=`

        <div style="color:green;font-weight:bold">

            Gemini

        </div>

        <div style="padding:10px">

            Thinking...

        </div>

    `;

    chat.appendChild(div);

    chat.scrollTop=chat.scrollHeight;

}

function removeLoading(){

    const loading=document.getElementById("loading");

    if(loading) loading.remove();

}

function escapeHtml(text){

    const div=document.createElement("div");

    div.innerText=text;

    return div.innerHTML;

}

function formatText(text){

    text=escapeHtml(text);

    text=text.replace(/```([\s\S]*?)```/g,function(match,p1){

        return "<pre style='background:#272822;color:#fff;padding:12px;border-radius:6px;overflow:auto'><code>"+p1+"</code></pre>";

    });

    text=text.replace(/\n/g,"<br>");

    return text;

}

</script>
</body>

</html>
