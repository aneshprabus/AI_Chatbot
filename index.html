<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Google AI Chat</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#1e1e1e;color:#eee}
header{background:#2b2b2b;padding:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input[type=password],select,textarea{padding:10px;border-radius:6px;border:1px solid #555;background:#333;color:#fff}
input[type=password]{flex:1;min-width:250px}
button{padding:10px 18px;border:none;border-radius:6px;background:#0b6efd;color:#fff;cursor:pointer}
button:hover{background:#0957c3}
#chat{height:65vh;overflow:auto;padding:20px;background:#252526}
.msg{margin:10px 0;padding:12px;border-radius:8px;white-space:pre-wrap}
.user{background:#0d6efd33;text-align:right}
.bot{background:#3a3a3a}
footer{display:flex;gap:10px;padding:12px;background:#2b2b2b}
textarea{flex:1;height:70px;resize:vertical}
.small{font-size:12px;color:#bbb}
</style>
</head>
<body>
<header>
<input id="apikey" type="password" placeholder="Enter Google AI Studio API Key">
<button onclick="connectAPI()">Connect</button>
<select id="modelSelect">
<option>Connect API First</option>
</select>
<span id="status" class="small"></span>
</header>

<div id="chat"></div>

<footer>
<textarea id="question" placeholder="Ask anything..."></textarea>
<button onclick="sendMessage()">Send</button>
<button onclick="clearChat()">Clear</button>
</footer>

<script>
let apiKey="";
const chat=document.getElementById("chat");

function addMessage(text,type){
 const d=document.createElement("div");
 d.className="msg "+type;
 d.textContent=text;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

async function connectAPI(){
 apiKey=document.getElementById("apikey").value.trim();
 if(!apiKey){alert("Enter API key");return;}
 document.getElementById("status").textContent="Connecting...";
 try{
   const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models?key="+apiKey);
   const data=await r.json();
   if(data.error) throw new Error(data.error.message);

   const allowed=[
     "models/gemini-3.5-flash",
     "models/gemini-3.1-flash-lite",
     "models/gemini-2.5-pro",
     "models/gemini-2.5-flash",
     "models/gemini-2.5-flash-lite",
     "models/gemini-2.0-flash",
     "models/gemini-2.0-flash-001",
     "models/gemini-2.0-flash-lite",
     "models/gemini-2.0-flash-lite-001",
     "models/gemma-4-31b-it",
     "models/gemma-4-26b-a4b-it"
   ];

   const sel=document.getElementById("modelSelect");
   sel.innerHTML="";
   data.models
   .filter(m=>allowed.includes(m.name))
   .forEach(m=>{
      const o=document.createElement("option");
      o.value=m.name;
      o.textContent=m.displayName;
      sel.appendChild(o);
   });
   document.getElementById("status").textContent="Connected";
 }catch(e){
   document.getElementById("status").textContent="Failed";
   alert(e.message);
 }
}

async function sendMessage(){
 const q=document.getElementById("question").value.trim();
 if(!q) return;
 if(!apiKey){alert("Connect API first.");return;}
 addMessage(q,"user");
 document.getElementById("question").value="";
 const wait=document.createElement("div");
 wait.className="msg bot";
 wait.textContent="Thinking...";
 chat.appendChild(wait);
 chat.scrollTop=chat.scrollHeight;

 try{
   const model=document.getElementById("modelSelect").value;
   const r=await fetch(
     "https://generativelanguage.googleapis.com/v1beta/"+model+":generateContent?key="+apiKey,
     {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        contents:[{parts:[{text:q}]}]
      })
     });
   const data=await r.json();
   wait.remove();
   if(data.error){
      addMessage("Error: "+data.error.message,"bot");
      return;
   }
   let ans="No response.";
   if(data.candidates && data.candidates.length){
      ans=data.candidates[0].content.parts.map(p=>p.text||"").join("");
   }
   addMessage(ans,"bot");
 }catch(e){
   wait.remove();
   addMessage(e.message,"bot");
 }
}

function clearChat(){chat.innerHTML="";}

document.getElementById("question").addEventListener("keydown",e=>{
 if(e.key==="Enter" && !e.shiftKey){
   e.preventDefault();
   sendMessage();
 }
});
</script>
</body>
</html>
