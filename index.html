<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gemini ChatBot</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

h2{
    text-align:center;
}

.chat-window{

    height:500px;
    overflow-y:auto;
    background:white;
    border-radius:10px;
    border:1px solid #ddd;
    padding:15px;
    margin-bottom:15px;

}

.message{

    margin-bottom:15px;
    padding:10px;
    border-radius:10px;
    line-height:1.6;

}

.user{

    background:#d9f4ff;
    text-align:right;

}

.bot{

    background:#eeeeee;

}

.controls{

    display:flex;
    gap:10px;

}

textarea{

    flex:1;
    resize:none;
    height:70px;
    padding:10px;
    font-size:16px;

}

button{

    width:120px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;

}

#sendBtn{

    background:#1976d2;
    color:white;

}

#clearBtn{

    background:#555;
    color:white;

}

.loading{

    color:green;
    font-style:italic;

}

</style>

</head>

<body>

<div class="container">

<h2>Gemini AI ChatBot</h2>

<div id="chatWindow" class="chat-window"></div>

<div class="controls">

<textarea
id="question"
placeholder="Type your question..."></textarea>

<button id="sendBtn">Send</button>

<button id="clearBtn">Clear</button>

</div>

</div>

<script>

let apiKey = "";

while(apiKey.trim()===""){
    apiKey = prompt("Enter your Google AI Studio API Key");
}

const chatWindow=document.getElementById("chatWindow");

function addMessage(text,type){

    const div=document.createElement("div");

    div.className="message "+type;

    div.innerHTML=text.replace(/\n/g,"<br>");

    chatWindow.appendChild(div);

    chatWindow.scrollTop=chatWindow.scrollHeight;

}

async function sendQuestion(){

    const textbox=document.getElementById("question");

    const question=textbox.value.trim();

    if(question==="") return;

    addMessage(question,"user");

    textbox.value="";

    const loading=document.createElement("div");
    loading.className="loading";
    loading.innerText="Thinking...";
    chatWindow.appendChild(loading);

    chatWindow.scrollTop=chatWindow.scrollHeight;

    try{

        const response=await fetch(

        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+apiKey,

        {

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                contents:[

                    {

                        parts:[

                            {

                                text:question

                            }

                        ]

                    }

                ]

            })

        });

        const data=await response.json();

        loading.remove();

        let answer="No response";

        if(
            data.candidates &&
            data.candidates.length>0
        ){

            answer=data.candidates[0]
            .content
            .parts
            .map(p=>p.text)
            .join("");

        }

        addMessage(answer,"bot");

    }

    catch(err){

        loading.remove();

        addMessage("Error : "+err.message,"bot");

    }

}

document.getElementById("sendBtn").onclick=sendQuestion;

document.getElementById("clearBtn").onclick=function(){

    chatWindow.innerHTML="";

}

document.getElementById("question")
.addEventListener("keydown",function(e){

    if(e.key==="Enter" && !e.shiftKey){

        e.preventDefault();

        sendQuestion();

    }

});

</script>

</body>
</html>
